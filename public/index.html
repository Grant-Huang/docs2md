<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All to Markdown - ж–Үд»¶иҪ¬жҚўе·Ҙе…·</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/styles/github.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" rel="stylesheet">
    <style>
        .preview {
            height: calc(100vh - 120px);
            overflow-y: auto;
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.25rem;
            position: relative;
            margin-top: 1rem;
        }
        .loading {
            display: none;
        }
        .error {
            color: #dc3545;
            display: none;
            margin-top: 1rem;
        }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 4px 8px;
            background-color: #fff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        .copy-btn:hover {
            opacity: 1;
        }
        .copy-btn i {
            font-size: 1rem;
            color: #6c757d;
        }
        .converter-section {
            height: calc(100vh - 120px);
            overflow-y: auto;
            padding-right: 15px;
        }
        .result-section {
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
        }
        .result-section .card-body {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        .result-section .preview {
            flex: 1;
            min-height: 200px;
        }
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #dee2e6;
        }
        .process-panel .card-header {
            cursor: pointer;
            padding: 0.5rem 1rem;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            padding: 1rem;
        }
        .markdown-body table {
            border-collapse: collapse;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #dee2e6;
            padding: 0.25rem 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <h1 class="text-center mb-3">All to Markdown</h1>
        <p class="text-center text-muted mb-4">е°Ҷ PDFгҖҒWordгҖҒExcel е’Ңи§Ҷйў‘иҪ¬жҚўдёә Markdown ж јејҸ</p>
        
        <div class="row">
            <!-- е·Ұдҫ§иҪ¬жҚўеҠҹиғҪеҢә -->
            <div class="col-md-5">
                <div class="card converter-section">
                    <div class="card-body">
                        <!-- PDFиҪ¬жҚўйғЁеҲҶ -->
                        <div class="section-title">PDFж–Үд»¶иҪ¬жҚў</div>
                        <form id="uploadForm" class="mb-4">
                            <div class="mb-3">
                                <label for="file" class="form-label">йҖүжӢ©ж–Үд»¶</label>
                                <input type="file" class="form-control" id="file" name="file" accept=".pdf,.mp4,.mov,.avi,.doc,.docx,.xls,.xlsx" required>
                                <div class="form-text">ж”ҜжҢҒ PDFгҖҒWordпјҲdoc/docxпјүгҖҒExcelпјҲxls/xlsxпјүе’Ңи§Ҷйў‘ж–Үд»¶</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">иҫ“еҮәж јејҸ</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="format" id="markdown" value="markdown" checked>
                                    <label class="form-check-label" for="markdown">
                                        Markdown
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="format" id="text" value="text">
                                    <label class="form-check-label" for="text">
                                        зәҜж–Үжң¬
                                    </label>
                                </div>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="convertPdf()">иҪ¬жҚўж–Үд»¶</button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <!-- YouTubeиҪ¬жҚўйғЁеҲҶ -->
                        <div class="section-title">YouTubeи§Ҷйў‘иҪ¬жҚў</div>
                        <form id="youtubeForm" class="mb-4">
                            <div class="mb-3">
                                <label for="youtubeUrl" class="form-label">YouTubeи§Ҷйў‘й“ҫжҺҘ</label>
                                <input type="url" class="form-control" id="youtubeUrl" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
                            </div>
                            <button type="submit" class="btn btn-primary">иҪ¬жҚўи§Ҷйў‘дёәMarkdown</button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <!-- жң¬ең°и§Ҷйў‘иҪ¬жҚўйғЁеҲҶ -->
                        <div class="section-title">жң¬ең°и§Ҷйў‘иҪ¬жҚў</div>
                        <div class="form-group mb-3">
                            <label for="videoFile">дёҠдј и§Ҷйў‘ж–Үд»¶пјҡ</label>
                            <input type="file" id="videoFile" accept="video/*" class="form-control">
                            <small class="form-text text-muted">ж”ҜжҢҒзҡ„ж јејҸпјҡMP4, AVI, MOV, MKK зӯү</small>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="convertVideo()">иҪ¬жҚўи§Ҷйў‘</button>
                    </div>
                </div>
            </div>
            
            <!-- еҸідҫ§з»“жһңжҳҫзӨәеҢә -->
            <div class="col-md-7">
                <div class="card result-section">
                    <div class="card-body">
                        <div class="section-title">иҪ¬жҚўз»“жһң</div>
                        
                        <!-- иҪ¬жҚўиҝҮзЁӢпјҲеҸҜжҠҳеҸ пјҢзҪ®дәҺз»“жһңеҢәдёҠж–№пјү -->
                        <div class="process-panel card mb-2" id="processPanel" style="display: none;">
                            <div class="card-header d-flex justify-content-between align-items-center py-2" data-bs-toggle="collapse" data-bs-target="#processCollapse">
                                <span><i class="bi bi-chevron-down me-1 process-toggle-icon"></i>иҪ¬жҚўиҝҮзЁӢ</span>
                                <button type="button" class="btn btn-sm btn-link p-0 text-muted" onclick="event.stopPropagation(); hideProcessPanel()">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                            <div class="collapse show" id="processCollapse">
                                <div class="card-body py-2">
                                    <div class="loading text-center" id="loading" style="display: none;">
                                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                                        <span class="ms-2">жӯЈеңЁиҪ¬жҚўпјҢиҜ·зЁҚеҖҷ...</span>
                                    </div>
                                    <div id="convertStatus" class="text-muted small mt-1" style="display: none;"></div>
                                    <div id="progressContainer" style="display: none;">
                                        <div class="progress mb-2">
                                            <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                        </div>
                                        <div id="progressMessage" class="text-muted small"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- й”ҷиҜҜдҝЎжҒҜ -->
                        <div class="error" id="error"></div>
                        
                        <!-- з»“жһңйў„и§Ҳ -->
                        <div class="preview">
                            <button class="copy-btn" id="copyBtn" style="display: none;" title="еӨҚеҲ¶иҪ¬жҚўз»“жһңеҲ°еүӘиҙҙжқҝ">
                                <i class="bi bi-clipboard"></i>
                            </button>
                            <div id="outputRendered" class="markdown-body" style="display: none;"></div>
                            <pre id="outputRaw" style="display: none; margin: 0;"><code id="output"></code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/highlight.min.js" defer></script>
    <script>
        let outputRawContent = '';
        function parseSSE(buf) {
            const parts = buf.split(/\n\ndata: /);
            const messages = parts.map((p, i) => (i === 0 ? p : 'data: ' + p));
            let remainder = '';
            if (messages.length > 0) {
                const last = messages[messages.length - 1];
                try {
                    if (last.startsWith('data: ')) {
                        JSON.parse(last.slice(6).trim());
                    }
                } catch (e) {
                    remainder = messages.pop() || '';
                }
            }
            return { messages, remainder };
        }
        function hideProcessPanel() {
            document.getElementById('processPanel').style.display = 'none';
        }
        function showProcessPanel() {
            const panel = document.getElementById('processPanel');
            panel.style.display = 'block';
            const collapseEl = document.getElementById('processCollapse');
            const instance = bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, { toggle: false });
            instance.show();
            const icon = document.querySelector('.process-toggle-icon');
            if (icon) icon.className = 'bi bi-chevron-down me-1 process-toggle-icon';
        }
        (function initProcessPanel() {
            const collapseEl = document.getElementById('processCollapse');
            if (collapseEl) {
                collapseEl.addEventListener('show.bs.collapse', () => {
                    const icon = document.querySelector('.process-toggle-icon');
                    if (icon) icon.className = 'bi bi-chevron-down me-1 process-toggle-icon';
                });
                collapseEl.addEventListener('hide.bs.collapse', () => {
                    const icon = document.querySelector('.process-toggle-icon');
                    if (icon) icon.className = 'bi bi-chevron-right me-1 process-toggle-icon';
                });
            }
        })();
        function setOutput(content, isMarkdown) {
            const rendered = document.getElementById('outputRendered');
            const raw = document.getElementById('outputRaw');
            const copyBtn = document.getElementById('copyBtn');
            if (content && typeof content === 'string') {
                if (content.trim().startsWith('data: ') || /"type"\s*:\s*"(?:debug|complete|error)"/.test(content)) {
                    const parts = content.split(/\n\ndata: /);
                    for (let i = parts.length - 1; i >= 0; i--) {
                        let p = parts[i];
                        if (i > 0) p = 'data: ' + p;
                        else if (!p.startsWith('data: ')) p = 'data: ' + p;
                        if (p.startsWith('data: ')) {
                            try {
                                const d = JSON.parse(p.slice(6).trim());
                                if (d.type === 'complete' && d.content && typeof d.content === 'string') {
                                    content = d.content;
                                    isMarkdown = true;
                                    break;
                                }
                            } catch (e) { /* skip */ }
                        }
                    }
                }
                if (content && content.trim().startsWith('data: ')) {
                    content = '';
                }
            }
            outputRawContent = content || '';
            if (isMarkdown && content) {
                try {
                    if (typeof marked !== 'undefined') {
                        marked.setOptions({ highlight: (code) => (typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code) });
                        const html = marked.parse(content);
                        rendered.innerHTML = (typeof html === 'string' ? html : content);
                        rendered.querySelectorAll('pre code').forEach((el) => { if (typeof hljs !== 'undefined') hljs.highlightElement(el); });
                    } else {
                        rendered.textContent = content;
                    }
                } catch (e) {
                    rendered.textContent = content;
                }
                rendered.style.display = 'block';
                raw.style.display = 'none';
            } else {
                document.getElementById('output').textContent = content || '';
                if (content && typeof hljs !== 'undefined') hljs.highlightElement(document.getElementById('output'));
                raw.style.display = content ? 'block' : 'none';
                rendered.style.display = 'none';
            }
            copyBtn.style.display = content ? 'block' : 'none';
        }
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            e.preventDefault();
            convertPdf();
        });

        document.getElementById('youtubeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const loading = document.querySelector('.loading');
            const error = document.querySelector('.error');
            showProcessPanel();
            loading.style.display = 'block';
            error.style.display = 'none';
            setOutput('', false);
            
            try {
                const response = await fetch('/api/tools/youtube-to-markdown', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: formData.get('url')
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    error.textContent = data.error;
                    error.style.display = 'block';
                } else {
                    setOutput(data.text, true);
                    setTimeout(() => {
                        const c = bootstrap.Collapse.getInstance(document.getElementById('processCollapse'));
                        if (c) c.hide();
                    }, 500);
                }
            } catch (err) {
                error.textContent = 'иҪ¬жҚўеӨұиҙҘпјҢиҜ·йҮҚиҜ•';
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });

        // еӨҚеҲ¶жҢүй’®еҠҹиғҪ
        document.getElementById('copyBtn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(outputRawContent);
                const copyBtn = document.getElementById('copyBtn');
                const originalIcon = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="bi bi-check"></i>';
                setTimeout(() => {
                    copyBtn.innerHTML = originalIcon;
                }, 2000);
            } catch (err) {
                console.error('еӨҚеҲ¶еӨұиҙҘ:', err);
            }
        });

        async function convertVideo() {
            const videoFile = document.getElementById('videoFile').files[0];
            if (!videoFile) {
                alert('иҜ·йҖүжӢ©и§Ҷйў‘ж–Үд»¶');
                return;
            }

            // иҺ·еҸ–жүҖжңүйңҖиҰҒзҡ„е…ғзҙ 
            const loading = document.querySelector('.loading');
            const error = document.querySelector('.error');
            const output = document.getElementById('output');
            const copyBtn = document.getElementById('copyBtn');

            if (!loading || !error) {
                console.error('жүҫдёҚеҲ°еҝ…иҰҒзҡ„DOMе…ғзҙ ');
                return;
            }

            const formData = new FormData();
            formData.append('video', videoFile);

            showProcessPanel();
            loading.style.display = 'block';
            document.getElementById('convertStatus').style.display = 'none';
            error.style.display = 'none';
            setOutput('', false);

            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressMessage = document.getElementById('progressMessage');
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressMessage.textContent = 'еҮҶеӨҮиҪ¬жҚў...';

            try {
                const response = await fetch('/convert-video', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const { messages, remainder } = parseSSE(buffer);
                    buffer = remainder;
                    for (const msg of messages) {
                        if (msg.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(msg.slice(6).trim());
                                if (data.type === 'error') {
                                    error.textContent = data.content;
                                    error.style.display = 'block';
                                } else if (data.type === 'complete') {
                                    setOutput(data.content, true);
                                    setTimeout(() => {
                                        const c = bootstrap.Collapse.getInstance(document.getElementById('processCollapse'));
                                        if (c) c.hide();
                                    }, 500);
                                } else if (data.type === 'debug') {
                                    progressMessage.textContent = data.content;
                                } else if (data.type === 'progress') {
                                    progressBar.style.width = `${data.progress}%`;
                                    progressMessage.textContent = data.content;
                                }
                            } catch (e) {
                                console.error('Error parsing message:', e);
                                error.textContent = 'и§Јжһҗе“Қеә”ж•°жҚ®еӨұиҙҘ: ' + e.message;
                                error.style.display = 'block';
                            }
                        }
                    }
                }
                if (buffer.trim()) {
                    const { messages } = parseSSE(buffer + '\n\n');
                    for (const msg of messages) {
                        if (msg.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(msg.slice(6).trim());
                                if (data.type === 'complete') setOutput(data.content, true);
                                else if (data.type === 'error') {
                                    error.textContent = data.content;
                                    error.style.display = 'block';
                                }
                            } catch (e) { console.error('Parse error:', e); }
                        }
                    }
                }
            } catch (err) {
                console.error('иҪ¬жҚўеӨұиҙҘ:', err);
                error.textContent = 'иҪ¬жҚўеӨұиҙҘ: ' + err.message;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                progressContainer.style.display = 'none';
            }
        }

        async function convertPdf() {
            try {
                const fileInput = document.getElementById('file');
                if (!fileInput) {
                    console.error('жүҫдёҚеҲ°fileиҫ“е…ҘжЎҶ');
                    return;
                }

                const file = fileInput.files[0];
                if (!file) {
                    alert('иҜ·йҖүжӢ©иҰҒиҪ¬жҚўзҡ„PDFж–Үд»¶');
                    return;
                }

                const loading = document.querySelector('.loading');
                const error = document.querySelector('.error');
                if (!loading || !error) return;

                const formData = new FormData();
                formData.append('file', file);
                formData.append('format', document.querySelector('input[name="format"]:checked').value);

                showProcessPanel();
                loading.style.display = 'block';
                document.getElementById('convertStatus').style.display = 'block';
                document.getElementById('convertStatus').textContent = 'еҮҶеӨҮиҪ¬жҚў...';
                error.style.display = 'none';
                setOutput('', false);

                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const { messages, remainder } = parseSSE(buffer);
                    buffer = remainder;
                    for (const msg of messages) {
                        if (msg.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(msg.slice(6).trim());
                                if (data.type === 'error') {
                                    error.textContent = data.content || data.error || 'иҪ¬жҚўеӨұиҙҘ';
                                    error.style.display = 'block';
                                    const statusEl = document.getElementById('convertStatus');
                                    const cur = statusEl.textContent || '';
                                    statusEl.textContent = cur ? cur + '\nиҪ¬жҚўеӨұиҙҘ' : 'иҪ¬жҚўеӨұиҙҘ';
                                    statusEl.style.display = 'block';
                                } else if (data.type === 'complete') {
                                    setOutput(data.content, formData.get('format') === 'markdown');
                                    const statusEl = document.getElementById('convertStatus');
                                    const cur = statusEl.textContent || '';
                                    statusEl.textContent = cur ? cur + '\nиҪ¬жҚўе®ҢжҲҗ' : 'иҪ¬жҚўе®ҢжҲҗ';
                                    statusEl.style.display = 'block';
                                    setTimeout(() => {
                                        const c = bootstrap.Collapse.getInstance(document.getElementById('processCollapse'));
                                        if (c) c.hide();
                                    }, 500);
                                } else if (data.type === 'debug') {
                                    const el = document.getElementById('convertStatus');
                                    const cur = el.textContent || '';
                                    el.textContent = cur && cur !== 'еҮҶеӨҮиҪ¬жҚў...' ? cur + '\n' + data.content : data.content;
                                } else if (data.type === 'progress') {
                                    document.getElementById('convertStatus').textContent = data.content || 'еӨ„зҗҶдёӯ...';
                                }
                            } catch (e) {
                                console.error('Error parsing message:', e);
                                error.textContent = 'и§Јжһҗе“Қеә”ж•°жҚ®еӨұиҙҘ: ' + e.message;
                                error.style.display = 'block';
                            }
                        }
                    }
                }
                if (buffer.trim()) {
                    const { messages } = parseSSE(buffer + '\n\n');
                    for (const msg of messages) {
                        if (msg.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(msg.slice(6).trim());
                                if (data.type === 'complete') {
                                    setOutput(data.content, formData.get('format') === 'markdown');
                                    const statusEl = document.getElementById('convertStatus');
                                    const cur = statusEl.textContent || '';
                                    statusEl.textContent = cur ? cur + '\nиҪ¬жҚўе®ҢжҲҗ' : 'иҪ¬жҚўе®ҢжҲҗ';
                                    statusEl.style.display = 'block';
                                    setTimeout(() => {
                                        const c = bootstrap.Collapse.getInstance(document.getElementById('processCollapse'));
                                        if (c) c.hide();
                                    }, 500);
                                } else if (data.type === 'error') {
                                    error.textContent = data.content || data.error || 'иҪ¬жҚўеӨұиҙҘ';
                                    error.style.display = 'block';
                                }
                            } catch (e) { console.error('Parse error:', e); }
                        }
                    }
                }
            } catch (error) {
                console.error('иҪ¬жҚўеӨұиҙҘ:', error);
                const errorElement = document.querySelector('.error');
                if (errorElement) {
                    errorElement.textContent = 'иҪ¬жҚўеӨұиҙҘ: ' + error.message;
                    errorElement.style.display = 'block';
                }
            } finally {
                document.querySelector('.loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
