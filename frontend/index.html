<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档资料知识化APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; }
        .main-row { min-height: 100vh; }
        .left-panel {
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
        }
        .op-area {
            padding: 1rem;
            border-bottom: 1px solid #dee2e6;
        }
        .prog-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .prog-log {
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        .result-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .markdown-body { padding: 1rem; box-sizing: border-box; }
        .result-index a { display: block; padding: 0.25rem 0; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row main-row g-0">
            <div class="col-md-4 left-panel">
                <div class="op-area">
                    <h5 class="mb-3">操作区</h5>
                    <div class="mb-3">
                        <label class="form-label">输入</label>
                        <div class="d-flex gap-2 flex-wrap">
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnSelectFile">选择文件</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="btnSelectDir">选择文件夹</button>
                        </div>
                        <input type="file" id="fileInput" class="d-none" accept=".docx,.doc,.xlsx,.xls" multiple>
                        <input type="file" id="dirInput" class="d-none" webkitdirectory directory multiple>
                        <small class="form-text text-muted" id="inputHint">未选择</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">输出目录</label>
                        <button type="button" class="btn btn-outline-secondary btn-sm w-100" id="btnSelectOutputDir">选择输出文件夹</button>
                        <small class="form-text text-muted" id="outputDirHint">未选择，将保存到服务器默认目录</small>
                        <div id="outputDirFallback" style="display:none;" class="mt-1">
                            <small class="text-muted">浏览器不支持，使用服务器子目录：</small>
                            <select id="outputDirSelect" class="form-select form-select-sm mt-1">
                                <option value="">默认 (output)</option>
                                <option value="docx">output/docx</option>
                                <option value="excel">output/excel</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">格式</label>
                        <select id="format" class="form-select form-select-sm">
                            <option value="md">Markdown (.md)</option>
                            <option value="txt">纯文本 (.txt)</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-primary" id="convertBtn">开始转换</button>
                </div>
                <div class="prog-area">
                    <h6 class="mb-2">转换过程</h6>
                    <div id="progLog" class="prog-log text-muted">等待操作...</div>
                </div>
            </div>
            <div class="col-md-8 right-panel">
                <div class="result-area">
                    <h5 class="mb-3">转换结果</h5>
                    <div id="resultSingle" style="display:none;">
                        <div id="resultRendered" class="markdown-body"></div>
                        <pre id="resultRaw" style="display:none; white-space: pre-wrap;"></pre>
                    </div>
                    <div id="resultIndex" style="display:none;">
                        <p class="text-muted">目录转换完成，生成索引：</p>
                        <div id="indexLinks"></div>
                    </div>
                    <div id="resultEmpty" class="text-muted">暂无结果</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
